<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>
    <link rel="stylesheet" href="/static/index.css">
    <script src="/static/index.js" defer></script>
</head>
<body class = "body">
    <div class = "container">
        <h1>Text Summarizer</h1>
        <h3> using Huggingface Transformers </h3>
    </div>

    <div class = "txt_area">
        <div class = "left">
            <h2>Input Text</h2>
            <textarea id = "input_text" placeholder="Enter text to summarize..."></textarea>
        </div>

        <div class = "right">
            <h2>Summary</h2>
            <textarea id = "summary_text" placeholder="Summary will appear here..." readonly></textarea>
        </div>
    </div>
    <div class = "buttons">
        <button id = "summarize_btn">Summarize</button>
        <button id = "clear_btn">Clear</button>
    </div>
</body>
</html>
